version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: finance-ledger-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: finance_ledger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - finance_ledger_postgres_data:/var/lib/postgresql/data
volumes:
  finance_ledger_postgres_data:
