version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: zorvyn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zorvyn_finance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - zorvyn_postgres_data:/var/lib/postgresql/data
volumes:
  zorvyn_postgres_data:
